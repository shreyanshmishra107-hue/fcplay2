    <style>
    /* Modal */
    .modal {
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        backdrop-filter: blur(6px);
        background: rgba(0,0,0,0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        animation: fadeIn .5s ease;
    }
    .modal.hidden {
        display: none !important;
    }
    .modal-content {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 30px 25px;
        width: 90%;
        max-width: 400px;
        text-align: center;
        color: #f3f4f6;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        backdrop-filter: blur(12px);
        transform: scale(.95);
        animation: scaleIn .4s ease forwards;
    }
    .modal-content h2 {
        font-size: 24px;
        font-weight: 700;
        color: #facc15;
        margin-bottom: 16px;
    }
    .modal-content p {
        font-size: 16px;
        color: #d1d5db;
        margin-bottom: 24px;
        line-height: 1.5;
    }
    .modal-content strong {
        color: #fff;
    }
    .modal-content .btn {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border: none;
        border-radius: 12px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: .3s;
    }
    #joinButton {
        background: linear-gradient(to right,#3b82f6,#06b6d4);
        color: #fff;
        font-weight: 500;
    }
    #joinButton:hover {
        background: linear-gradient(to right,#2563eb,#0891b2);
        transform: scale(1.02);
    }
    #closeButton {
        background: rgba(255,255,255,0.1);
        color: #f3f4f6;
    }
    #closeButton:hover {
        background: rgba(255,255,255,0.15);
        transform: scale(1.02);
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes scaleIn { to { transform: scale(1); opacity: 1 } }
    </style>
