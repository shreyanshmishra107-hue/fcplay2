<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Famcode - Matches</title>
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    
    <!-- Shaka Player (still using it for DASH/HLS playback) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

    <!-- Your requested modal styles -->
    <style>
    body {
        margin: 0;
        background: #000;
        height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
        color: #fff;
    }
    html, body { height: 100%; }
    .shaka-video-container {
        width: 100%;
        height: 100%;
    }
    video {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    /* Modal */
    .modal {
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        backdrop-filter: blur(6px);
        background: rgba(0,0,0,0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        animation: fadeIn .5s ease;
    }
    .modal.hidden {
        display: none !important;
    }
    .modal-content {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 30px 25px;
        width: 90%;
        max-width: 400px;
        text-align: center;
        color: #f3f4f6;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        backdrop-filter: blur(12px);
        transform: scale(.95);
        animation: scaleIn .4s ease forwards;
    }
    .modal-content h2 {
        font-size: 24px;
        font-weight: 700;
        color: #facc15;
        margin-bottom: 16px;
    }
    .modal-content p {
        font-size: 16px;
        color: #d1d5db;
        margin-bottom: 24px;
        line-height: 1.5;
    }
    .modal-content strong {
        color: #fff;
    }
    .modal-content .btn {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border: none;
        border-radius: 12px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: .3s;
    }
    #joinButton {
        background: linear-gradient(to right, #3b82f6, #06b6d4);
        color: #fff;
        font-weight: 500;
    }
    #joinButton:hover {
        background: linear-gradient(to right, #2563eb, #0891b2);
        transform: scale(1.02);
    }
    #closeButton {
        background: rgba(255,255,255,0.1);
        color: #f3f4f6;
    }
    #closeButton:hover {
        background: rgba(255,255,255,0.15);
        transform: scale(1.02);
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes scaleIn { to { transform: scale(1); opacity: 1 } }
    </style>
</head>
<body>

    <!-- Shaka video container -->
    <div class="shaka-video-container">
        <video id="video" playsinline autoplay></video>
    </div>

    <!-- Your Telegram Popup Modal -->
    <div id="telegramModal" class="modal">
        <div class="modal-content">
            <h2>Join Our Telegram</h2>
            <p>Stay updated with the latest <strong>Live Match Links</strong> and updates. Click below to join our official Telegram channel.</p>
            <a href="https://t.me/+7VkflslOE9s4YjQ9" target="_blank" style="text-decoration:none;">
                <button id="joinButton" class="btn">Join Telegram</button>
            </a>
            <button id="closeButton" class="btn">Maybe Later</button>
        </div>
    </div>

    <!-- Close button logic -->
    <script>
    document.getElementById("closeButton").onclick = function(){
        document.getElementById("telegramModal").classList.add("hidden");
    };
    </script>

    <!-- Minimal working Shaka Player initialization example -->
    <script>
    // Wait for DOM
    document.addEventListener('DOMContentLoaded', async () => {
        // Show modal immediately (or you can delay / condition it)
        // document.getElementById("telegramModal").classList.remove("hidden");

        // Basic Shaka setup (you'll need to provide real manifest URL)
        const video = document.getElementById('video');
        
        if (shaka.Player.isBrowserSupported()) {
            const player = new shaka.Player(video);
            
            // Optional: install polyfills & UI (if you want controls)
            shaka.ui.Overlay.install({ player, video });

            // Example manifest - replace with your real stream URL
            const manifestUri = 'https://example.com/your-stream.mpd'; // ← CHANGE THIS

            try {
                await player.load(manifestUri);
                console.log('Stream loaded successfully');
            } catch (error) {
                console.error('Error loading stream:', error);
            }
        } else {
            console.error('Browser not supported by Shaka Player');
        }
    });
    </script>

</body>
</html>
